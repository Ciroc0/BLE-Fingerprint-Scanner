name: CI/CD - Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  frontend:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check (TypeScript)
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

  backend:
    name: Backend (Rust) Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        rust: [stable]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libsoup2.4-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            libfuse-dev \
            libbluetooth-dev \
            libglib2.0-dev \
            patchelf \
            pkg-config

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v5
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v5
        with:
          path: src-tauri/target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Cargo check
        run: cd src-tauri && cargo check

      - name: Cargo test
        run: cd src-tauri && cargo test --verbose

  safety:
    name: Safety & Policy Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Security guard - No active scanning
        run: npm run safety:no-connect
        continue-on-error: false

      - name: Check for debug console logs
        run: |
          if grep -r "console\.log\|console\.warn\|console\.error" src --include="*.ts" --include="*.tsx" | grep -v "node_modules\|dist"; then
            echo "Warning: Debug console statements found in source"
          fi
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          if grep -r "api.?key\|secret\|password\|token\|bearer" src-tauri src --include="*.rs" --include="*.ts" --include="*.tsx" | grep -v "node_modules\|target\|dist"; then
            echo "Warning: Potential hardcoded credentials found"
          fi
        continue-on-error: true

  build-desktop:
    name: Desktop Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libssl-dev \
            libsoup2.4-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            librsvg2-dev \
            libfuse-dev \
            libbluetooth-dev \
            libglib2.0-dev \
            patchelf \
            pkg-config

      - name: Install frontend deps
        run: npm ci

      - name: Build desktop app
        run: npm run tauri build

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: artifacts-${{ matrix.os }}
          path: src-tauri/target/release/bundle/
          if-no-files-found: warn
          retention-days: 7
